      kichwa: "Ukku, huma, samay tantachiyta (yoga) yachachik 7 chinikupi alli kana."
    closing_reminder:
      es: "Recuerda: reconocer tus emociones es el primer paso para cuidar tu bienestar."
      kichwa: "Yuyari: shuk nikipika, allí kayta rikuriyanapakka, ukku kutichiyta yachakchayana."

