name: ergokawsay
description: ErgoKawsay - Bienestar y Salud Intercultural para docentes.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  shared_preferences: ^2.2.3
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4
  just_audio: ^0.9.40
  video_player: ^2.9.2
  provider: ^6.1.2
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/illustrations/splash_hero.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/illustrations/splash_hero.png"
  web:
    generate: false

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
    - assets/images/
    - assets/images/illustrations/
    - assets/images/thumbnails/
    - assets/branding/
    - assets/emotions/
    - assets/illustrations/
    - assets/videos/
    - assets/Extra/ergonomia/
    - assets/Extra/posturas/
